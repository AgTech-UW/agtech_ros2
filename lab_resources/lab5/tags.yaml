apriltag:
  ros__parameters:
    image_transport: raw        # Listen to raw image topic
    family: 36h11               # The standard tag family
    size: 0.120                 # 12 cm tag size (MEASURE YOUR PRINTOUT!)
    max_hamming: 0              # Error correction strictness
    z_up: true                  # Z axis points up (world convention)

    # --- PERFORMANCE PARAMETERS (safe defaults for all platforms) ---
    decimate: 2.0               # 1.0 = full res, 2.0 = half res (4x faster)
    threads: 4                  # Use more CPU cores
    refine_edges: 0             # 1 = precise, 0 = fast